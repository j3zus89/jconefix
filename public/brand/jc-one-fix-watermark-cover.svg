<?xml version="1.0" encoding="UTF-8"?>
<!--
  Pill badge (estilo landing: fondo negro, lima + blanco). Para tapar sello Pictory en video.
  PNG: npm run brand:watermark-png
-->
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="88" viewBox="0 0 640 88" role="img" aria-label="Hecho con JC ONE FIX">
  <defs>
    <style>
      .muted { font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif; font-size: 15px; font-weight: 600; fill: rgba(255,255,255,0.72); letter-spacing: 0.04em; }
      .brand { font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif; font-size: 30px; font-weight: 800; letter-spacing: 0.1em; }
      .lime { fill: #a3e635; }
      .white { fill: #ffffff; }
    </style>
  </defs>

  <rect x="3" y="3" width="634" height="82" rx="41" ry="41"
        fill="#000000" stroke="#a3e635" stroke-width="3"/>

  <g transform="translate(22, 26)" fill="none" stroke="#a3e635" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14 4.5a3.5 3.5 0 0 1 4.9 4.9l-1.5 1.5L12 14.3 9.7 12l3.4-5.4 1.5-1.5z"/>
    <path d="M8.5 12.5 4 17c-.8.8-.8 2 0 2.8s2 .8 2.8 0l4.5-4.5"/>
  </g>

  <text x="54" y="44" class="muted" dominant-baseline="middle">Hecho con</text>

  <text x="178" y="44" class="brand" dominant-baseline="middle">
    <tspan class="lime">JC</tspan><tspan class="white">ONE</tspan><tspan class="lime">FIX</tspan>
  </text>
</svg>
